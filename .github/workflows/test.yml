name: Dagger Module Unit tests

on:
  push:
    branches:
      - main
    paths:
      - 'dagger/maintenance/**'
  pull_request:
    paths:
      - 'dagger/maintenance/**'
  workflow_dispatch:

defaults:
  run:
    shell: 'bash -Eeuo pipefail -x {0}'

permissions: {}

jobs:
  unit-test:
    name: Go unit tests
    runs-on: ubuntu-24.04
    permissions:
      packages: read
    env:
      # renovate: datasource=github-tags depName=dagger/dagger versioning=semver
      DAGGER_VERSION: 0.21.7
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: dagger/maintenance/go.mod
          cache-dependency-path: dagger/maintenance/go.sum

      - name: Log in to the GitHub Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate the Dagger client
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        env:
          # Provision the engine from GHCR instead of registry.dagger.io, whose
          # Fly.io-hosted front intermittently times out from GitHub runners.
          _EXPERIMENTAL_DAGGER_RUNNER_HOST: docker-image://ghcr.io/dagger/engine:v${{ env.DAGGER_VERSION }}
        with:
          version: ${{ env.DAGGER_VERSION }}
          verb: develop
          module: ./dagger/maintenance/

      - name: Run unit tests
        working-directory: dagger/maintenance
        env:
          # The generated Dagger client reads these at package init time. The
          # unit tests never open a session, so dummy values are enough to get
          # past the init check without contacting an engine.
          DAGGER_SESSION_PORT: "1"
          DAGGER_SESSION_TOKEN: "test"
        run: go test ./...
